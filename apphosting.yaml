# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting/configure
#
# App Hosting builds this Next.js app from your connected GitHub branch and
# serves it on Cloud Run + CDN. No Dockerfile or `output: standalone` needed.

runConfig:
  minInstances: 0 # scales to zero to save cost; set 1 to keep always-warm
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  # Default is 60s. Opus 4.7 with adaptive thinking + vision on a complex
  # handwritten page can run 30-90s; 180s gives headroom without letting
  # a wedged request tie up the instance forever.
  timeoutSeconds: 180

env:
  # Public Firebase client config. Safe to commit — NEXT_PUBLIC_* is inlined into
  # the browser bundle, so it must be present at BUILD time.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDLZRKS__nV_nU3Y0WxEkAup4kGy0rlLhw
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: radiology-report-generat-b026f.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: radiology-report-generat-b026f
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: radiology-report-generat-b026f.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "971174520916"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:971174520916:web:b541a583cc08cc907765c1"
    availability: [BUILD, RUNTIME]

  # --- Claude Opus 4.7 — single AI provider ---
  # Set the secret once with:  firebase apphosting:secrets:set ANTHROPIC_API_KEY
  # then grant access:          firebase apphosting:secrets:grantaccess ANTHROPIC_API_KEY --backend <backend-id>
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability: [RUNTIME]
